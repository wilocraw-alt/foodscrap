name: Fetch Weekly Menu

on:
  # 매일 오전 9시 (KST = UTC 0시) 실행
  schedule:
    - cron: '37 23 * * *'
  # 수동 실행 가능
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pymupdf

      - name: Fetch menu data
        run: python scripts/fetch_menu.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/menu.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/menu.json
          git commit -m "🍱 Update menu ($(date -u +%Y-%m-%d))"
          git push
